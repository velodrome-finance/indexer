# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: Velodrome_v2
description: Lightweight indexer for Velodrome V2 on Optimism and superchains (pool-level TVL/Volume/Fees/Revenue only, no Base
rollback_on_reorg: true
raw_events: false
field_selection:
  transaction_fields:
    - "hash"
contracts:
  - name: PoolFactory
    abi_file_path: abis/PoolFactory.json
    handler: src/EventHandlers/PoolFactory.ts
    events:
      - event: PoolCreated
      - event: SetCustomFee
  - name: RootCLPoolFactory
    abi_file_path: abis/RootCLPoolFactory.json
    handler: src/EventHandlers/RootCLPoolFactory.ts
    events:
      - event: RootPoolCreated
  - name: CLFactory
    abi_file_path: abis/CLFactory.json
    handler: src/EventHandlers/CLFactory.ts
    events:
      - event: PoolCreated
      - event: TickSpacingEnabled
  - name: CLPool
    abi_file_path: abis/CLPool.json
    handler: src/EventHandlers/CLPool.ts
    events:
      - event: Burn
      - event: Collect
      - event: CollectFees
      - event: Flash
      - event: IncreaseObservationCardinalityNext
      - event: Mint
      - event: SetFeeProtocol
      - event: Swap
  - name: Pool
    abi_file_path: abis/Pool.json
    handler: src/EventHandlers/Pool.ts
    events:
      - event: Mint
      - event: Burn
      - event: Fees
      - event: Claim
      - event: Swap
      - event: Sync
      - event: Transfer
  - name: Voter
    abi_file_path: abis/VoterV2.json
    handler: src/EventHandlers/Voter/Voter.ts
    events:
      - event: DistributeReward
      - event: GaugeCreated
      - event: GaugeKilled
      - event: GaugeRevived
  - name: SuperchainLeafVoter
    abi_file_path: abis/SuperchainLeafVoter.json
    handler: src/EventHandlers/Voter/SuperchainLeafVoter.ts
    events:
      - event: GaugeCreated
      - event: GaugeKilled
      - event: GaugeRevived
  - name: FeesVotingReward
    abi_file_path: abis/FeesVotingReward.json
    handler: src/EventHandlers/VotingReward/FeesVotingReward.ts
    events:
      - event: ClaimRewards
  - name: BribesVotingReward
    abi_file_path: abis/BribesVotingReward.json
    handler: src/EventHandlers/VotingReward/BribesVotingReward.ts
    events:
      - event: ClaimRewards
  - name: CLGauge
    abi_file_path: abis/CLGauge.json
    handler: src/EventHandlers/Gauges/CLGauge.ts
    events:
      - event: Deposit
      - event: Withdraw
      - event: ClaimRewards
  - name: Gauge
    abi_file_path: abis/Gauge.json
    handler: src/EventHandlers/Gauges/Gauge.ts
    events:
      - event: Deposit
      - event: Withdraw
      - event: ClaimRewards
  - name: DynamicSwapFeeModule
    abi_file_path: abis/DynamicSwapFeeModule.json
    handler: src/EventHandlers/SwapFeeModule/DynamicSwapFeeModule.ts
    events:
      - event: CustomFeeSet
      - event: SecondsAgoSet
      - event: ScalingFactorSet
      - event: FeeCapSet
  - name: CustomSwapFeeModule
    abi_file_path: abis/CustomSwapFeeModule.json
    handler: src/EventHandlers/SwapFeeModule/CustomSwapFeeModule.ts
    events:
      - event: SetCustomFee
