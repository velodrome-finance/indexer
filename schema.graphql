type Pool {
  id: ID! # Format: {chainId}-{poolAddress} (PoolId)
  chainId: Int! # chain id
  poolAddress: String! # address of the pool
  name: String! # name of the pool
  token0_id: String! # token0 id
  token1_id: String! # token1 id
  token0_address: String! # token0 address
  token1_address: String! # token1 address
  isStable: Boolean! # whether the pool is a stable AMM or a volatile AMM
  isCL: Boolean! # whether the pool is a CL pool
  createdBlockNumber: BigInt! @config(precision: 76) # Block number at which PoolCreated fired; used to clamp roundBlockToInterval so getSwapFee/getTokenPrice never query before pool deployment (#759)
  tickSpacing: BigInt! @config(precision: 24) # Tick spacing of the pool; 0 for non-CL pools
  reserve0: BigInt! @config(precision: 76) # reserve of token0 in token units
  reserve1: BigInt! @config(precision: 76) # reserve of token1 in token units
  totalLPTokenSupply: BigInt! @config(precision: 76) # total supply of LP tokens (tracked from Transfer events)
  totalLiquidityUSD: BigInt! @config(precision: 76) # total liquidity of the swap pool in USD
  totalVolume0: BigInt! @config(precision: 76) # total swap volume of token0 in token units
  totalVolume1: BigInt! @config(precision: 76) # total swap volume of token1 in token units
  totalVolumeUSD: BigInt! @config(precision: 76) # total swap volume of the pool in USD
  totalFeesGenerated0: BigInt! @config(precision: 76) # total swap fees generated of token0 in token units
  totalFeesGenerated1: BigInt! @config(precision: 76) # total swap fees generated of token1 in token units
  totalFeesGeneratedUSD: BigInt! @config(precision: 76) # total swap fees of the pool in USD
  totalUnstakedFeesCollected0: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in token0 units
  totalUnstakedFeesCollected1: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in token1 units
  totalStakedFeesCollected0: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in token0 units
  totalStakedFeesCollected1: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in token1 units
  totalUnstakedFeesCollectedUSD: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in USD
  totalStakedFeesCollectedUSD: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in USD
  numberOfSwaps: BigInt! @config(precision: 76) # total number of swaps in the pool
  token0Price: BigInt! @config(precision: 76) # price of token0 relative to token1
  token1Price: BigInt! @config(precision: 76) # price of token1 relative to token0
  totalVotesDeposited: BigInt! @config(precision: 76) # total votes deposited in veToken units
  totalVotesDepositedUSD: BigInt! @config(precision: 76) # total votes deposited in USD
  totalEmissions: BigInt! @config(precision: 76) # total emissions for the pool in reward token units (VELO form Optimism and AERO for Base); 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)
  # Cumulative across all DistributeReward events using the reward token's price at
  # each event's block (incrementalTotalEmissionsUSD = amount × pricePerUSDNew, see
  # src/EventHandlers/Voter/VoterCommonLogic.ts). For gauges that stopped emitting
  # before the chain's V3 oracle reliably priced the reward token (AERO/Base pre
  # 2024-06-14, VELO/OP pre 2024-01-10), this cumulative will be permanently $0
  # even when totalEmissions > 0 — affects 188 legacy pools (143 Base + 45 OP).
  # See issue #738 for context.
  totalEmissionsUSD: BigInt! @config(precision: 76) # total emissions for the pool in USD
  totalEmissionsRedistributed: BigInt! @config(precision: 76) # cumulative reward tokens this pool's gauge received from the Redistributor (Redistributed events); AERO/VELO 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)
  totalEmissionsForfeited: BigInt! @config(precision: 76) # cumulative reward tokens this pool's gauge forwarded to the Redistributor or minter because it was over its cap (Deposited events); AERO/VELO 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)

  lastUpdatedTimestamp: Timestamp! # timestamp of last update
  lastSnapshotTimestamp: Timestamp! # timestamp of last snapshot

  # CL Pool specific fields
  # protocol fee % for token0. Set via SetFeeProtocol (governance-gated admin call).
  # Uniformly 0 across all Slipstream pools as of 2026-05: Aerodrome/Velodrome
  # governance has not activated protocol fees. The handler (src/EventHandlers/CLPool.ts)
  # is wired correctly; the field will populate only when (and if) governance turns the
  # toggle on. Slipstream's slot0() does not pack feeProtocol and the pool exposes no
  # feeProtocol() getter, so the on-chain SetFeeProtocol event is the only source.
  feeProtocol0: BigInt @config(precision: 76)
  # As feeProtocol0, for token1.
  feeProtocol1: BigInt @config(precision: 76)
  observationCardinalityNext: BigInt @config(precision: 76) # oracle observation cardinality
  sqrtPriceX96: BigInt @config(precision: 76) # current sqrt price (Q96 fixed point) - updated from Swap/Initialize events
  tick: BigInt @config(precision: 24) # current tick - updated from Swap/Initialize events
  liquidityInRange: BigInt @config(precision: 76) # active-tick in-range liquidity L. Recomputed on Swap; bumped on Mint/Burn when tickLower <= currentTick < tickUpper.
  stakedLiquidityInRange: BigInt @config(precision: 76) # staked in-range liquidity L (running counter from tick-based tracking)
  stakedReserve0: BigInt @config(precision: 76) # staked reserves in token0 raw units (running counter)
  stakedReserve1: BigInt @config(precision: 76) # staked reserves in token1 raw units (running counter)
  # True once any staked position has been recorded for this pool. Gates the
  # per-swap staked-tick sweep in processTickCrossings: pools that have
  # never been staked skip the sweep entirely. Set on the first gauge Deposit.
  # One-way latch: does NOT clear if every staked position is later withdrawn.
  # A transiently-staked-then-fully-unstaked pool will keep running the sweep
  # (with zero contributions). The structural fix that makes the residual cost
  # negligible is tracked in #649 (sparse stakedTickEdges list); until it lands,
  # the latch is "accept a degenerate case to avoid the bookkeeping of clearing".
  hasStakes: Boolean!
  # Parallel arrays encoding Uniswap v3's per-tick liquidityNet for the staked
  # subset. Sorted ascending by tick, dedup'd, no zero-net entries. Same length,
  # same index: (stakedTickEdges[i], stakedTickEdgeNets[i]) is one (tick, net)
  # pair. Two arrays instead of one list-of-structs because GraphQL lists only
  # allow scalars or named types — tuples don't exist at this layer.
  #
  # Maintained on gauge deposit / withdraw / NFPM staked-position liquidity
  # changes. Consumed by processTickCrossings via in-memory binary
  # search — no per-tick entity loads on the swap path, which breaks the OOM
  # chain-of-amplification from #648.
  stakedTickEdges: [BigInt!]!
  stakedTickEdgeNets: [BigInt!]! # Per-tick liquidityNet for the staked subset; paired index-for-index with stakedTickEdges (see stakedTickEdges).
  # Total-liquidity analog of stakedTickEdges/stakedTickEdgeNets: the pool's full
  # per-tick liquidityNet map (all positions, not just staked). Maintained on
  # CLPool Mint/Burn; consumed by processTickCrossings on the swap path
  # to compute the fee-free reserve delta from pool geometry (L·ΔsqrtPrice),
  # replacing the stale-fee approximation that drifts on dynamic-fee pools (#803).
  tickEdges: [BigInt!]!
  tickEdgeNets: [BigInt!]! # Per-tick liquidityNet for all positions; paired index-for-index with tickEdges (see tickEdges).
  totalFlashLoanFees0: BigInt @config(precision: 76) # total flash loan fees collected in token0
  totalFlashLoanFees1: BigInt @config(precision: 76) # total flash loan fees collected in token1
  totalFlashLoanFeesUSD: BigInt @config(precision: 76) # total flash loan fees collected in USD
  totalFlashLoanVolumeUSD: BigInt @config(precision: 76) # total flash loan volume in USD
  numberOfFlashLoans: BigInt @config(precision: 76) # total number of flash loans

  # Gauge fields
  gaugeIsAlive: Boolean! # whether the gauge is alive
  gaugeAddress: String @index # address of the gauge for this pool
  gaugeEmissionsCap: BigInt @config(precision: 76) # Emissions cap for gauge. If not specified in an SetEmissionsCap event, set to defaultEmissionsCap as per CLGaugeConfig. If CLGaugeConfig doesn't exist, there's no emissions cap
  minStakeTime: BigInt! @config(precision: 24) # Per-pool LP stake lockup (seconds). Seeded from CLGaugeConfig.defaultMinStakeTime at pool creation; overridden by CLGaugeFactoryV3.SetPoolMinStakeTime. 0 before V3.
  numberOfGaugeDeposits: BigInt! @config(precision: 76) # number of gauge deposits (staking)
  numberOfGaugeWithdrawals: BigInt! @config(precision: 76) # number of gauge withdrawals (unstaking)
  numberOfGaugeRewardClaims: BigInt! @config(precision: 76) # number of gauge reward claims
  totalGaugeRewardsClaimedUSD: BigInt! @config(precision: 76) # total gauge rewards claimed in USD
  totalGaugeRewardsClaimed: BigInt! @config(precision: 76) # total gauge rewards claimed in reward-token units — AERO on Base, VELO on Optimism (18-dec); single reward token per chain, coherent within a chain, NOT summable across chains (see #813)
  currentLiquidityStaked: BigInt! @config(precision: 76) # current liquidity staked in gauge in token units
  currentLiquidityStakedUSD: BigInt! @config(precision: 76) # current liquidity staked in gauge in USD

  # Voting Reward fields
  bribeVotingRewardAddress: String @index # address of the bribe voting reward contract for this pool
  totalBribeClaimedUSD: BigInt! @config(precision: 76) # total bribes claimed by users in USD (canonical cross-token aggregate; raw token-unit sum dropped in #813 — bribes are arbitrary heterogeneous tokens)
  feeVotingRewardAddress: String @index # address of the fee voting reward contract for this pool
  totalFeeRewardClaimedUSD: BigInt! @config(precision: 76) # total fee rewards claimed by users in USD (canonical cross-token aggregate; raw token-unit sum dropped in #813 — fee rewards mix the pool's two fee tokens)
  veNFTamountStaked: BigInt! @config(precision: 76) # total amount of veNFT staked for this pool

  # Dynamic Fee fields
  baseFee: BigInt! @config(precision: 24) # Current base fee set for pool
  feeCap: BigInt @config(precision: 76) # Current fee cap for pool
  scalingFactor: BigInt @config(precision: 76) # Current scaling factor for pool
  currentFee: BigInt! @config(precision: 76) # Current fee for pool (base + dynamic)

  # Unstaked Fee fields
  # Raw customFee value last emitted by an UnstakedFeeModule for this pool (CL pools only).
  # 0 = no override (factory default applies), 420 = explicit 0% fee (ZERO_FEE_INDICATOR),
  # else fee rate with 6-decimal precision (e.g. 500_000 = 50%). Null = never set.
  unstakedFee: BigInt @config(precision: 24)

  # Pool Launcher relationship
  poolLauncherPoolId: String # ID of the PoolLauncherPool entity if this pool was launched via Pool Launcher

  # Address of the factory that created this pool (e.g. CLFactory for CL pools, set from PoolCreated event)
  factoryAddress: String

  # Address of the NFPM contract that mints positions for this CL pool. Null for V2 (non-CL) pools.
  # Resolved from (chainId, factoryAddress) via nfpmForCLPool in Constants.ts. Used by downstream
  # consumers (gauges, user-stats, NFPM handlers) to derive the correct NFPM without a separate scan.
  nfpmAddress: String @index

  # RootPool matching - only relevant for non-OP and non-Base pools
  # For each superChain pool there's a unique rootPool
  # This is because the rootPool is created through a hash of these 4 quantities and they are a unique combination (enforced by smart contract)
  rootPoolMatchingHash: String! @index # {chainId}_{token0_address}_{token1_address}_{tickSpacing}
}

# Snapshot of the LiquidityPool entity
type PoolSnapshot {
  id: ID! # Format: {chainId}-{poolAddress}-{epochMs} (PoolId-epochMs, epochMs from getSnapshotEpoch)
  chainId: Int! # chain id
  name: String! # name of the pool
  poolAddress: String! # address of the pool
  token0_id: String! # token0 id
  token1_id: String! # token1 id
  token0_address: String! # token0 address
  token1_address: String! # token1 address
  isStable: Boolean! # whether the pool is a stable AMM or a volatile AMM
  isCL: Boolean! # whether the pool is a CL pool
  reserve0: BigInt! @config(precision: 76) # reserve of token0 in token units
  reserve1: BigInt! @config(precision: 76) # reserve of token1 in token units
  totalLPTokenSupply: BigInt! @config(precision: 76) # total supply of LP tokens (tracked from Transfer events)
  totalLiquidityUSD: BigInt! @config(precision: 76) # total liquidity of the swap pool in USD
  totalVolume0: BigInt! @config(precision: 76) # total swap volume of token0 in token units
  totalVolume1: BigInt! @config(precision: 76) # total swap volume of token1 in token units
  totalVolumeUSD: BigInt! @config(precision: 76) # total swap volume of the pool in USD
  totalFeesGenerated0: BigInt! @config(precision: 76) # total swap fees generated of token0 in token units
  totalFeesGenerated1: BigInt! @config(precision: 76) # total swap fees generated of token1 in token units
  totalFeesGeneratedUSD: BigInt! @config(precision: 76) # total swap fees of the pool in USD
  totalUnstakedFeesCollected0: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in token0 units
  totalUnstakedFeesCollected1: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in token1 units
  totalStakedFeesCollected0: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in token0 units
  totalStakedFeesCollected1: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in token1 units
  totalUnstakedFeesCollectedUSD: BigInt! @config(precision: 76) # total fees collected from unstaked LPs (Collect events) in USD
  totalStakedFeesCollectedUSD: BigInt! @config(precision: 76) # total fees collected from staked LPs (CollectFees events) in USD
  numberOfSwaps: BigInt! @config(precision: 76) # total number of swaps in the pool
  token0Price: BigInt! @config(precision: 76) # price of token0 relative to token1
  token1Price: BigInt! @config(precision: 76) # price of token1 relative to token0
  totalVotesDeposited: BigInt! @config(precision: 76) # total votes deposited in veToken units
  totalVotesDepositedUSD: BigInt! @config(precision: 76) # total votes deposited in USD
  totalEmissions: BigInt! @config(precision: 76) # total emissions for the pool in reward token units (VELO form Optimism and AERO for Base); 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)
  totalEmissionsUSD: BigInt! @config(precision: 76) # total emissions for the pool in USD
  totalEmissionsRedistributed: BigInt! @config(precision: 76) # cumulative reward tokens this pool's gauge received from the Redistributor at snapshot time; AERO/VELO 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)
  totalEmissionsForfeited: BigInt! @config(precision: 76) # cumulative reward tokens this pool's gauge forwarded to the Redistributor or minter at snapshot time; AERO/VELO 18-dec, single reward token per chain — coherent within a chain, NOT cross-chain summable (see #813)

  gaugeIsAlive: Boolean! # whether the gauge is alive
  gaugeAddress: String @index # address of the gauge for this pool
  gaugeEmissionsCap: BigInt @config(precision: 76) # Emissions cap for gauge
  minStakeTime: BigInt! @config(precision: 24) # Per-pool LP stake lockup (seconds) at snapshot time
  numberOfGaugeDeposits: BigInt! @config(precision: 76) # number of gauge deposits (staking)
  numberOfGaugeWithdrawals: BigInt! @config(precision: 76) # number of gauge withdrawals (unstaking)
  numberOfGaugeRewardClaims: BigInt! @config(precision: 76) # number of gauge reward claims
  totalGaugeRewardsClaimedUSD: BigInt! @config(precision: 76) # total gauge rewards claimed in USD
  totalGaugeRewardsClaimed: BigInt! @config(precision: 76) # total gauge rewards claimed in reward-token units — AERO on Base, VELO on Optimism (18-dec); single reward token per chain, coherent within a chain, NOT summable across chains (see #813)
  currentLiquidityStaked: BigInt! @config(precision: 76) # current liquidity staked in gauge in token units
  currentLiquidityStakedUSD: BigInt! @config(precision: 76) # current liquidity staked in gauge in USD
  timestamp: Timestamp! # timestamp of last update

  # CL Pool specific fields
  # protocol fee % for token0. Set via SetFeeProtocol (governance-gated admin call).
  # Uniformly 0 across all Slipstream pools as of 2026-05: Aerodrome/Velodrome
  # governance has not activated protocol fees. The handler (src/EventHandlers/CLPool.ts)
  # is wired correctly; the field will populate only when (and if) governance turns the
  # toggle on. Slipstream's slot0() does not pack feeProtocol and the pool exposes no
  # feeProtocol() getter, so the on-chain SetFeeProtocol event is the only source.
  feeProtocol0: BigInt @config(precision: 76)
  # As feeProtocol0, for token1.
  feeProtocol1: BigInt @config(precision: 76)
  observationCardinalityNext: BigInt @config(precision: 76) # oracle observation cardinality
  sqrtPriceX96: BigInt @config(precision: 76) # current sqrt price (Q96 fixed point) - updated from Swap/Initialize events
  tick: BigInt @config(precision: 24) # current tick - updated from Swap/Initialize events
  liquidityInRange: BigInt @config(precision: 76) # active-tick in-range liquidity L. Recomputed on Swap; bumped on Mint/Burn when tickLower <= currentTick < tickUpper.
  stakedLiquidityInRange: BigInt @config(precision: 76) # staked in-range liquidity L
  stakedReserve0: BigInt @config(precision: 76) # staked reserves in token0 raw units
  stakedReserve1: BigInt @config(precision: 76) # staked reserves in token1 raw units
  totalFlashLoanFees0: BigInt @config(precision: 76) # total flash loan fees collected in token0
  totalFlashLoanFees1: BigInt @config(precision: 76) # total flash loan fees collected in token1
  totalFlashLoanFeesUSD: BigInt @config(precision: 76) # total flash loan fees collected in USD
  totalFlashLoanVolumeUSD: BigInt @config(precision: 76) # total flash loan volume in USD
  numberOfFlashLoans: BigInt @config(precision: 76) # total number of flash loans

  # Voting Reward fields
  bribeVotingRewardAddress: String @index # address of the bribe voting reward contract for this pool
  totalBribeClaimedUSD: BigInt! @config(precision: 76) # total bribes claimed by users in USD (canonical cross-token aggregate; raw token-unit sum dropped in #813 — bribes are arbitrary heterogeneous tokens)
  feeVotingRewardAddress: String @index # address of the fee voting reward contract for this pool
  totalFeeRewardClaimedUSD: BigInt! @config(precision: 76) # total fee rewards claimed by users in USD (canonical cross-token aggregate; raw token-unit sum dropped in #813 — fee rewards mix the pool's two fee tokens)
  veNFTamountStaked: BigInt! @config(precision: 76) # total amount of veNFT staked for this pool

  # Dynamic Fee fields
  baseFee: BigInt! @config(precision: 24) # Current base fee set for pool
  feeCap: BigInt @config(precision: 76) # Current fee cap for pool
  scalingFactor: BigInt @config(precision: 76) # Current scaling factor for pool
  currentFee: BigInt! @config(precision: 76) # Current fee for pool (base + dynamic)

  # Unstaked Fee fields
  unstakedFee: BigInt @config(precision: 24) # Raw customFee value last emitted by an UnstakedFeeModule for this pool (see Pool for semantics)
}

# Entity for tracking user activity and positions in specific pools
type UserStatsPerPool {
  id: ID! # Format: {chainId}-{userAddress}-{poolAddress} (UserStatsPerPoolId)
  userAddress: String! @index # user wallet address
  poolAddress: String! @index # address of the pool these stats are scoped to
  chainId: Int! # chain id

  # Liquidity metrics
  lpBalance: BigInt! @config(precision: 76) # user's LP token balance (tracked from Transfer events)
  totalLiquidityAddedUSD: BigInt! @config(precision: 76) # cumulative USD value of liquidity added (from IncreaseLiquidity events, Transfer ADD attribution, and direct non-NFPM CLPool.Mint)
  totalLiquidityAddedToken0: BigInt! @config(precision: 76) # cumulative raw token0 amount added (sum of event.params.amount0 from IncreaseLiquidity + Transfer ADD + direct non-NFPM CLPool.Mint). May differ from removed due to price movement between deposit and withdrawal
  totalLiquidityAddedToken1: BigInt! @config(precision: 76) # cumulative raw token1 amount added (sum of event.params.amount1 from IncreaseLiquidity + Transfer ADD + direct non-NFPM CLPool.Mint). May differ from removed due to price movement between deposit and withdrawal
  totalLiquidityRemovedUSD: BigInt! @config(precision: 76) # cumulative USD value of liquidity removed (from DecreaseLiquidity events, Transfer REMOVE attribution, and direct non-NFPM CLPool.Burn)
  totalLiquidityRemovedToken0: BigInt! @config(precision: 76) # cumulative raw token0 amount removed (sum of event.params.amount0 from DecreaseLiquidity + Transfer REMOVE + direct non-NFPM CLPool.Burn). Can exceed totalLiquidityAddedToken0 due to price movement (impermanent loss rebalancing)
  totalLiquidityRemovedToken1: BigInt! @config(precision: 76) # cumulative raw token1 amount removed (sum of event.params.amount1 from DecreaseLiquidity + Transfer REMOVE + direct non-NFPM CLPool.Burn). Can exceed totalLiquidityAddedToken1 due to price movement (impermanent loss rebalancing)

  # Swap metrics
  numberOfSwaps: BigInt! @config(precision: 76) # number of swaps in this pool
  totalSwapVolumeAmount0: BigInt! @config(precision: 76) # swap volume denominated in token0 in this pool
  totalSwapVolumeAmount1: BigInt! @config(precision: 76) # swap volume denominated in token1 in this pool
  totalSwapVolumeUSD: BigInt! @config(precision: 76) # swap volume in USD in this pool
  totalFeesContributedUSD: BigInt! @config(precision: 76) # total fees contributed in USD (from swaps made by the user - essentially fees paid by the user in swaps)
  totalFeesContributed0: BigInt! @config(precision: 76) # total fees contributed in token0 (from swaps made by the user - essentially fees paid by the user in swaps)
  totalFeesContributed1: BigInt! @config(precision: 76) # total fees contributed in token1 (from swaps made by the user - essentially fees paid by the user in swaps)

  # Flash swap metrics
  numberOfFlashLoans: BigInt! @config(precision: 76) # number of flash loan swaps in this pool
  totalFlashLoanVolumeUSD: BigInt! @config(precision: 76) # flash loan swap volume in USD in this pool

  # Gauge metrics
  numberOfGaugeDeposits: BigInt! @config(precision: 76) # number of gauge deposits (staking)
  numberOfGaugeWithdrawals: BigInt! @config(precision: 76) # number of gauge withdrawals (unstaking)
  numberOfGaugeRewardClaims: BigInt! @config(precision: 76) # number of gauge reward claims
  totalGaugeRewardsClaimedUSD: BigInt! @config(precision: 76) # total gauge rewards claimed in USD
  totalGaugeRewardsClaimed: BigInt! @config(precision: 76) # total gauge rewards claimed in reward-token units — AERO on Base, VELO on Optimism (18-dec); single reward token per chain, coherent within a chain, NOT summable across chains (see #813)
  totalStakedFeesCollected0: BigInt! @config(precision: 76) # pool fees (token0) collected by this user from staked position (CollectFees)
  totalStakedFeesCollected1: BigInt! @config(precision: 76) # pool fees (token1) collected by this user from staked position (CollectFees)
  totalStakedFeesCollectedUSD: BigInt! @config(precision: 76) # pool fees in USD collected by this user from staked position (CollectFees) - position earned vs totalGaugeRewardsClaimed (emissions received)
  totalUnstakedFeesCollected0: BigInt! @config(precision: 76) # pool fees (token0) collected by this user from unstaked position (Collect)
  totalUnstakedFeesCollected1: BigInt! @config(precision: 76) # pool fees (token1) collected by this user from unstaked position (Collect)
  totalUnstakedFeesCollectedUSD: BigInt! @config(precision: 76) # pool fees in USD collected by this user from unstaked position (Collect)
  currentLiquidityStaked: BigInt! @config(precision: 76) # current liquidity staked in gauge in token units
  currentLiquidityStakedUSD: BigInt! @config(precision: 76) # current liquidity staked in gauge in USD
  stakedCLPositionTokenIds: [BigInt!]! # tokenIds of CL positions currently staked in gauge (maintained on deposit/withdraw, enables O(1) primary-key lookups per position at snapshot time)

  # Voting metrics
  totalBribeClaimedUSD: BigInt! @config(precision: 76) # total USD value of bribe rewards claimed by this user for this pool (canonical cross-token aggregate; raw token-unit sum dropped in #813 — bribes are arbitrary heterogeneous tokens)
  totalFeeRewardClaimedUSD: BigInt! @config(precision: 76) # total USD value of fee rewards claimed by this user for this pool (canonical cross-token aggregate; raw token-unit sum dropped in #813 — fee rewards mix the pool's two fee tokens)
  veNFTamountStaked: BigInt! @config(precision: 76) # amount of veNFT staked by this user for this pool

  # ALM metrics
  almAddress: String! # Address of ALM LP Wrapper (if the user interacts with it; otherwise defaults to "")
  almLpAmount: BigInt! @config(precision: 76) # Number of LP tokens
  lastAlmActivityTimestamp: Timestamp! # last ALM related activity that changed ALM related fields on user entity

  # Timestamps
  firstActivityTimestamp: Timestamp! # first activity in this pool
  lastActivityTimestamp: Timestamp! # last activity in this pool
  lastSnapshotTimestamp: Timestamp # nullable - null means never snapshotted
}

# Snapshot of UserStatsPerPool at an epoch (invariant fields + position params for recomputation)
type UserStatsPerPoolSnapshot {
  id: ID! # Format: {chainId}-{userAddress}-{poolAddress}-{epochMs} (UserStatsPerPoolSnapshotId)
  userAddress: String! @index # user wallet address
  poolAddress: String! @index # address of the pool these stats are scoped to
  chainId: Int! # chain id
  timestamp: Timestamp! @index # snapshot epoch timestamp

  # Liquidity metrics
  lpBalance: BigInt! @config(precision: 76) # user's LP token balance at snapshot time
  totalLiquidityAddedUSD: BigInt! @config(precision: 76) # cumulative USD value of liquidity added
  totalLiquidityAddedToken0: BigInt! @config(precision: 76) # cumulative raw token0 amount added
  totalLiquidityAddedToken1: BigInt! @config(precision: 76) # cumulative raw token1 amount added
  totalLiquidityRemovedUSD: BigInt! @config(precision: 76) # cumulative USD value of liquidity removed
  totalLiquidityRemovedToken0: BigInt! @config(precision: 76) # cumulative raw token0 amount removed
  totalLiquidityRemovedToken1: BigInt! @config(precision: 76) # cumulative raw token1 amount removed

  # Swap metrics
  numberOfSwaps: BigInt! @config(precision: 76) # number of swaps the user made in this pool
  totalSwapVolumeAmount0: BigInt! @config(precision: 76) # swap volume denominated in token0 in this pool
  totalSwapVolumeAmount1: BigInt! @config(precision: 76) # swap volume denominated in token1 in this pool
  totalSwapVolumeUSD: BigInt! @config(precision: 76) # swap volume in USD in this pool
  totalFeesContributedUSD: BigInt! @config(precision: 76) # total fees contributed in USD (fees paid by the user in swaps)
  totalFeesContributed0: BigInt! @config(precision: 76) # total fees contributed in token0
  totalFeesContributed1: BigInt! @config(precision: 76) # total fees contributed in token1

  # Flash swap metrics
  numberOfFlashLoans: BigInt! @config(precision: 76) # number of flash loan swaps in this pool
  totalFlashLoanVolumeUSD: BigInt! @config(precision: 76) # flash loan swap volume in USD in this pool

  # Gauge metrics
  numberOfGaugeDeposits: BigInt! @config(precision: 76) # number of gauge deposits (staking)
  numberOfGaugeWithdrawals: BigInt! @config(precision: 76) # number of gauge withdrawals (unstaking)
  numberOfGaugeRewardClaims: BigInt! @config(precision: 76) # number of gauge reward claims
  totalGaugeRewardsClaimedUSD: BigInt! @config(precision: 76) # total gauge rewards claimed in USD
  totalGaugeRewardsClaimed: BigInt! @config(precision: 76) # total gauge rewards claimed in reward-token units — AERO on Base, VELO on Optimism (18-dec); single reward token per chain, coherent within a chain, NOT summable across chains (see #813)
  totalStakedFeesCollected0: BigInt! @config(precision: 76) # pool fees (token0) collected by this user from staked position (CollectFees)
  totalStakedFeesCollected1: BigInt! @config(precision: 76) # pool fees (token1) collected by this user from staked position (CollectFees)
  totalStakedFeesCollectedUSD: BigInt! @config(precision: 76) # pool fees in USD collected by this user from staked position (CollectFees)
  totalUnstakedFeesCollected0: BigInt! @config(precision: 76) # pool fees (token0) collected by this user from unstaked position (Collect)
  totalUnstakedFeesCollected1: BigInt! @config(precision: 76) # pool fees (token1) collected by this user from unstaked position (Collect)
  totalUnstakedFeesCollectedUSD: BigInt! @config(precision: 76) # pool fees in USD collected by this user from unstaked position (Collect)
  currentLiquidityStaked: BigInt! @config(precision: 76) # current liquidity staked in gauge in token units
  currentLiquidityStakedUSD: BigInt! @config(precision: 76) # current liquidity staked in gauge in USD
  stakedCLPositionTokenIds: [BigInt!]! # tokenIds of CL positions staked in gauge at snapshot time

  # Voting metrics
  totalBribeClaimedUSD: BigInt! @config(precision: 76) # total USD value of bribe rewards claimed by this user for this pool (canonical cross-token aggregate; raw token-unit sum dropped in #813 — bribes are arbitrary heterogeneous tokens)
  totalFeeRewardClaimedUSD: BigInt! @config(precision: 76) # total USD value of fee rewards claimed by this user for this pool (canonical cross-token aggregate; raw token-unit sum dropped in #813 — fee rewards mix the pool's two fee tokens)
  veNFTamountStaked: BigInt! @config(precision: 76) # amount of veNFT staked by this user for this pool

  # ALM metrics
  almAddress: String! # Address of ALM LP Wrapper the user interacts with (empty string if none)
  almLpAmount: BigInt! @config(precision: 76) # Number of ALM LP tokens held by the user
  lastAlmActivityTimestamp: Timestamp! # last ALM-related activity timestamp
  lastActivityTimestamp: Timestamp! # last activity in this pool
}

# Entity that tracks the latest state of the token entity
# By nature this entity saves the latest state of the token, and its state at different times should be attained from the snapshot entities
type Token {
  id: ID! # Format: {chainId}-{address} (TokenId)
  address: String! @index # token address
  symbol: String! # token symbol
  name: String! # token name
  chainId: Int! @index # chain id
  decimals: BigInt! @config(precision: 76) # number of decimals
  pricePerUSDNew: BigInt! @config(precision: 76) # price of token per USD
  lastUpdatedTimestamp: Timestamp! # timestamp of last refresh attempt (used by 1-hour throttle)
  lastSuccessfulPriceTimestamp: Timestamp # timestamp of last non-zero oracle write (used by 7-day fallback staleness window, #694)
  isWhitelisted: Boolean! # whether the token is whitelisted

  # Price-trust gate per-token decision surface (issue #755 slice 2). Populated
  # at every Token construction site (Voter.WhitelistToken, SuperchainLeafVoter
  # .WhitelistToken, PriceOracle.createTokenEntity, VotingReward reward-token
  # bootstrap) via `PriceTrust.getGateDecisionFromSignals`; subsequent refreshes
  # preserve the stamped values via spread until slice-3+ aggregator paths
  # re-evaluate via `PriceTrust.getGateDecision` at consume time. Null only on
  # rows that predate the field's introduction.
  #
  # Stored as String (not enum) so values can extend without an Envio schema
  # migration. The TypeScript value sets are pinned by the `PRICE_TRUST_OUTCOME`
  # / `PRICE_TRUST_REASON` const objects in `src/PriceTrust.ts` — call sites
  # should reference those constants rather than bare string literals.
  #
  # Trusted-USD aggregates are written into the existing `*USD` fields on Pool
  # — no `*USDTrusted` companion fields. Per-chain rollback uses the migration
  # mode flag introduced in slice 4; A/B comparison against pre-gate values is
  # done offline via the diff script (issue #755 US #19).
  priceTrustOutcome: String
  priceTrustReason: String # Reason code paired with priceTrustOutcome; values pinned by PRICE_TRUST_REASON in src/PriceTrust.ts (see priceTrustOutcome).
}

# Snapshot of the Token entity
type TokenPriceSnapshot {
  id: ID! # Format: {chainId}-{address}-{blockNumber} (TokenIdByBlock)
  address: String! @index # Address of the token
  pricePerUSDNew: BigInt! @config(precision: 76) # price of token per USD
  chainId: Int! # chain id
  isWhitelisted: Boolean! # whether the token is whitelisted
  lastUpdatedTimestamp: Timestamp! @index # Timestamp of the last update
}

# Tracks relevant data for each NFT minted: each NFT represents a concentrated position in a pool
# Note: amount0, amount1, amountUSD are derived fields computed on-demand from liquidity + sqrtPriceX96 + ticks
type NonFungiblePosition {
  id: ID! # Format: {chainId}-{nfpmAddress}-{tokenId} (NonFungiblePositionId). Natural key is (NFPM, tokenId); pool is metadata and preserved as a field. nfpmAddress disambiguates intra-chain tokenId collisions across multiple NFPMs (e.g. Optimism has two).
  chainId: Int! # Chain ID where the NFT exists
  tokenId: BigInt! @index # Token ID of the NFT (from Transfer event)
  nfpmAddress: String! @index # Address of the NFPM contract that emitted the Transfer; disambiguates intra-chain tokenId collisions across multiple NFPMs (e.g. Optimism has two)
  owner: String! @index # Checksum address of the current owner (from Transfer event)
  pool: String! @index # Address of the CL pool this position belongs to
  tickUpper: BigInt! @config(precision: 24) # Upper tick of the position range
  tickLower: BigInt! @config(precision: 24) # Lower tick of the position range
  token0: String! # Address of token0 in the position
  token1: String! # Address of token1 in the position
  liquidity: BigInt! @config(precision: 76) # Current liquidity value of the position
  mintTransactionHash: String! @index # Transaction hash of the NFT mint transaction
  mintLogIndex: Int! # Log index of CLPool.Mint event (for placeholder matching)
  lastUpdatedTimestamp: Timestamp! # Timestamp of last update
  lastSnapshotTimestamp: Timestamp # nullable - null means never snapshotted
  isStakedInGauge: Boolean! # Set from NFPM.Transfer to/from the pool's gauge; owner is not updated on gauge transfers so we need this to know staked vs not.
}

# Snapshot of NonFungiblePosition at an epoch (full state for historical queries / recomputation)
type NonFungiblePositionSnapshot {
  id: ID! # Format: {chainId}-{nfpmAddress}-{tokenId}-{epochMs} (NonFungiblePositionSnapshotId). nfpmAddress disambiguates intra-chain tokenId collisions across multiple NFPMs (e.g. Optimism has two).
  chainId: Int! # chain id where the NFT exists
  tokenId: BigInt! @index # token ID of the NFT
  nfpmAddress: String! @index # address of the NFPM contract that emitted the Transfer
  owner: String! @index # checksum address of the owner at snapshot time
  pool: String! @index # address of the CL pool this position belongs to
  tickLower: BigInt! @config(precision: 24) # lower tick of the position range
  tickUpper: BigInt! @config(precision: 24) # upper tick of the position range
  token0: String! # address of token0 in the position
  token1: String! # address of token1 in the position
  liquidity: BigInt! @config(precision: 76) # liquidity value of the position at snapshot time
  mintTransactionHash: String! @index # transaction hash of the NFT mint transaction
  mintLogIndex: Int! # log index of the CLPool.Mint event (for placeholder matching)
  lastUpdatedTimestamp: Timestamp! # timestamp of last update before this snapshot
  isStakedInGauge: Boolean! # whether the position is staked in the pool's gauge at snapshot time
  timestamp: Timestamp! @index # snapshot epoch timestamp
}

type VeNFTState {
  id: ID! # Format: {chainId}-{tokenId} (VeNFTId)
  chainId: Int! # chain id
  tokenId: BigInt! @config(precision: 76) # veNFT token ID
  owner: String! # current owner address of the veNFT
  locktime: BigInt! @config(precision: 76) # lock expiry timestamp (seconds); 0 for permanent locks
  isPermanent: Boolean! # whether the lock is permanent (never expires)
  lastUpdatedTimestamp: Timestamp! # timestamp of last update
  totalValueLocked: BigInt! @config(precision: 76) # amount of governance token locked in the veNFT
  isAlive: Boolean! # whether the veNFT still exists (false after burn/withdraw)
  lastSnapshotTimestamp: Timestamp # nullable - null means never snapshotted
  votesPerPool: [VeNFTPoolVote!]! @derivedFrom(field: "veNFTState") # reverse relation: this veNFT's per-pool vote allocations
}

# Snapshot of VeNFTState at an epoch (full state for historical queries)
type VeNFTStateSnapshot {
  id: ID! # Format: {chainId}-{tokenId}-{epochMs} (VeNFTStateSnapshotId)
  chainId: Int! # chain id
  tokenId: BigInt! @index # veNFT token ID
  owner: String! @index # owner address at snapshot time
  locktime: BigInt! @config(precision: 76) # lock expiry timestamp (seconds); 0 for permanent locks
  isPermanent: Boolean! # whether the lock is permanent (never expires)
  lastUpdatedTimestamp: Timestamp! # timestamp of last update before this snapshot
  totalValueLocked: BigInt! @config(precision: 76) # amount of governance token locked in the veNFT
  isAlive: Boolean! # whether the veNFT still exists at snapshot time
  timestamp: Timestamp! @index # snapshot epoch timestamp
  # reverse relation: this veNFT's per-pool vote allocations at snapshot time
  votesPerPool: [VeNFTPoolVoteSnapshot!]!
    @derivedFrom(field: "veNFTStateSnapshot")
}

type VeNFTPoolVote {
  id: ID! # Format: {chainId}-{tokenId}-{poolAddress} (VeNFTPoolVoteId)
  poolAddress: String! @index # pool this veNFT allocated votes to
  veNFTamountStaked: BigInt! @config(precision: 76) # vote weight this veNFT allocated to the pool, in veToken units
  veNFTState: VeNFTState! @index # the veNFT that cast this vote
  lastUpdatedTimestamp: Timestamp! # timestamp of last update
}

type VeNFTPoolVoteSnapshot {
  id: ID! # Format: {chainId}-{tokenId}-{poolAddress}-{epochMs}
  chainId: Int! # chain id
  tokenId: BigInt! @config(precision: 76) # veNFT token ID
  poolAddress: String! @index # pool this veNFT allocated votes to
  veNFTamountStaked: BigInt! @config(precision: 76) # vote weight allocated to the pool, in veToken units
  lastUpdatedTimestamp: Timestamp! # timestamp of last update before this snapshot
  timestamp: Timestamp! @index # snapshot epoch timestamp
  veNFTStateSnapshot: VeNFTStateSnapshot! @index # the veNFT-state snapshot this vote belongs to
}

# ALM LP Wrapper entity
# Tracks both the LP wrapper state (aggregated deposits/withdrawals) and the strategy position state
# Relationship: 1 LP wrapper per pool, 1 strategy per LP wrapper, 1 tokenId per strategy, 1 AMM position per tokenId (1:1:1:1 relationship)
# Therefore this single entity tracks everything for the wrapper and its strategy
type ALM_LP_Wrapper {
  id: ID! # Format: {chainId}-{wrapperAddress} (ALMLPWrapperId)
  chainId: Int! # The blockchain network ID where this wrapper exists
  pool: String! @index # Address of the pool this ALM wrapper is associated with
  token0: String! # Address of token 0
  token1: String! # Address of token 1

  # Wrapper-level state
  lpAmount: BigInt! @config(precision: 76) # Total number of LP tokens wrapped (aggregated across all users)
  lastUpdatedTimestamp: Timestamp! # Timestamp of the last update to this entity

  # Strategy/Position-level state (updated by StrategyCreated and Rebalance events)
  # Since there's exactly 1 strategy per wrapper, we store it here
  tokenId: BigInt! @config(precision: 24) @index # Equal to tokenId. Unique identifier for the strategy/position
  tickLower: BigInt! @config(precision: 24) # Lower tick bound of the position's price range (in tick units)
  tickUpper: BigInt! @config(precision: 24) # Upper tick bound of the position's price range (in tick units)
  property: BigInt! @config(precision: 24) # Pool property parameter from the AMM position struct
  liquidity: BigInt! @config(precision: 76) # Amount of liquidity currently in the AMM position

  strategyType: BigInt! @config(precision: 24) # Type/kind of ALM strategy being used (defines the strategy behavior)
  tickNeighborhood: BigInt! @config(precision: 24) # Tick neighborhood parameter for the strategy (defines rebalancing range around current price)
  tickSpacing: BigInt! @config(precision: 24) # Tick spacing for the strategy (minimum tick movement allowed)
  positionWidth: BigInt! @config(precision: 24) # Width parameter for the strategy (defines the position size in ticks)
  maxLiquidityRatioDeviationX96: BigInt! @config(precision: 76) # Maximum allowed liquidity ratio deviation in X96 fixed-point format (controls rebalancing thresholds)
  creationTimestamp: Timestamp! # Timestamp when this strategy was created (from StrategyCreated event)
  strategyTransactionHash: String! @index # Transaction hash of the StrategyCreated event
  lastSnapshotTimestamp: Timestamp # nullable - null means never snapshotted
}

# Snapshot of ALM_LP_Wrapper at an epoch (full state for historical queries / recomputation)
type ALM_LP_WrapperSnapshot {
  id: ID! # Format: {chainId}-{wrapperAddress}-{epochMs} (ALMLPWrapperSnapshotId)
  wrapper: String! @index # address of the ALM LP wrapper
  pool: String! @index # address of the pool this wrapper is associated with
  chainId: Int! # chain id
  token0: String! # address of token0
  token1: String! # address of token1
  lpAmount: BigInt! @config(precision: 76) # total LP tokens wrapped at snapshot time
  lastUpdatedTimestamp: Timestamp! # timestamp of last update before this snapshot
  tokenId: BigInt! @config(precision: 24) @index # strategy/position tokenId
  tickLower: BigInt! @config(precision: 24) # lower tick bound of the position's price range
  tickUpper: BigInt! @config(precision: 24) # upper tick bound of the position's price range
  property: BigInt! @config(precision: 24) # pool property parameter from the AMM position struct
  liquidity: BigInt! @config(precision: 76) # liquidity currently in the AMM position
  strategyType: BigInt! @config(precision: 24) # type/kind of ALM strategy in use
  tickNeighborhood: BigInt! @config(precision: 24) # tick neighborhood parameter for the strategy
  tickSpacing: BigInt! @config(precision: 24) # tick spacing for the strategy
  positionWidth: BigInt! @config(precision: 24) # width parameter for the strategy (position size in ticks)
  maxLiquidityRatioDeviationX96: BigInt! @config(precision: 76) # max allowed liquidity ratio deviation (X96 fixed point)
  creationTimestamp: Timestamp! # timestamp when the strategy was created
  strategyTransactionHash: String! @index # transaction hash of the StrategyCreated event
  timestamp: Timestamp! @index # snapshot epoch timestamp
}

type FactoryRegistryConfig {
  id: ID! # Format: {srcAddress}_{chainId} (factory registry contract address)
  currentActivePoolFactory: String! # Address of the currently active pool factory (creates vAMM/sAMM or CL pools)
  currentActiveVotingRewardsFactory: String! # Address of the currently active voting rewards factory (creates fee and bribe voting reward contracts)
  currentActiveGaugeFactory: String! # Address of the currently active gauge factory (creates gauge contracts for emissions)
  lastUpdatedTimestamp: Timestamp! # Timestamp when the factory registry configuration was last updated
}

type DynamicFeeGlobalConfig {
  id: ID! # Format: contract address (DynamicSwapFeeModule)
  chainId: Int! @index # chain id
  secondsAgo: BigInt @config(precision: 32) # The amount of time used to calculate price change
}

# One per underlying pool (per chain) launched or migrated via Pool Launcher
type PoolLauncherPool {
  id: ID! # Format: {chainId}-{underlyingPool}
  chainId: Int! # chain id
  underlyingPool: Bytes! # pool address
  launcher: String! # PoolLauncher contract address (the one that created or currently manages)
  creator: String! # msg.sender at Launch
  poolLauncherToken: Bytes! # the "project" token
  pairToken: Bytes! # whitelisted pair (e.g., WETH, USDC)
  createdAt: Timestamp! # timestamp the pool was launched
  isEmerging: Boolean! # current flag
  lastFlagUpdateAt: Timestamp! # timestamp of last flag change

  # Migration lineage
  migratedFrom: String! # previous underlying pool (if this was target in Migrate)
  migratedTo: String! # next underlying pool (if later migrated away)
  oldLocker: String! # source locker in migration
  newLocker: String! # target locker from migration
  lastMigratedAt: Timestamp! # timestamp of the most recent migration

  poolStats: [Pool!]! @derivedFrom(field: "poolLauncherPoolId") # reverse relation: Pool aggregates launched under this PoolLauncherPool
}

type PoolLauncherConfig {
  id: ID! # Format: {chainId}-{poolLauncherAddress} (PoolId with launcher contract as address)
  version: String! # "CL" for concentrated liquidity, "V2" for V2 pools
  pairableTokens: [String!] # Whitelisted tokens an emerging-token pool may be paired against on this launcher
}

# A superswap is characterized by 3 steps:
# 1. Original asset is swapped for oUSDT on the source chain.
# 2. The oUSDT is then bridged through Hyperlane to the destination chain.
# 3. Bridged oUSDT is then swapped into the preferred asset on the destination chain.
type SuperSwap {
  id: ID! # Format: {messageId} — globally unique Hyperlane message identifier
  originChainId: BigInt! @config(precision: 24) # Chain ID where the swap originated
  destinationChainId: BigInt! @config(precision: 24) # Resolved EVM chain ID of the swap target/recipient (mapped from the Hyperlane domain via domainToChainId)
  sender: String! # Original sender address initiating the swap
  recipient: String! # The recipient address on the destination chain
  oUSDTamount: BigInt! @config(precision: 76) # Amount of oUSDT swapped (already normalized to token decimals)
  sourceChainToken: String! # Token that gets swapped by oUSDT on source chain, i.e., Token A -> oUSDT on source chain
  sourceChainTokenAmountSwapped: BigInt! @config(precision: 76) # Amount of sourceChainToken that was swapped for oUSDT on the source chain
  destinationChainToken: String! # Token that gets swapped by oUSDT on destination chain, i.e., oUSDT -> Token B on destination chain
  destinationChainTokenAmountSwapped: BigInt! @config(precision: 76) # Amount of destinationChainToken that was received from swapping oUSDT on the destination chain
  timestamp: Timestamp! # Block timestamp of the swap event
}

type OUSDTBridgedTransaction {
  id: ID! # Format: transaction hash (unique per bridge tx)
  transactionHash: String! @index # Transaction hash
  originChainId: BigInt! @config(precision: 24) # Chain ID where the bridge transaction originated
  destinationChainId: BigInt! @config(precision: 24) # Resolved EVM chain ID the bridge transaction is destined for (mapped from the Hyperlane domain via domainToChainId)
  sender: String! # Address that initiated the bridge transaction
  recipient: String! # Address that will receive the bridged tokens
  amount: BigInt! @config(precision: 76) # Amount of oUSDT tokens being bridged
}

# Registering each event related from/to oUSDT. Needed for filtering and eventual registration of source/destination token
# and corresponding amounts during superswaps execution
type OUSDTSwaps {
  id: ID! # Format: {transactionHash}_{chainId}_{tokenInPool}_{amountIn}_{tokenOutPool}_{amountOut}
  transactionHash: String! @index # Transaction hash of the swap transaction
  tokenInPool: String! # Token that goes into the pool after swap
  tokenOutPool: String! # Token that goes out of the pool after swap
  amountIn: BigInt! @config(precision: 76) # Amount of tokenInPool being swapped into the pool
  amountOut: BigInt! @config(precision: 76) # Amount of tokenOutPool being swapped out of the pool
}

# Stores chain-wide CLGauge config data — default emissions cap, default
# min-stake-time, and penalty rate. Keyed by chainId so the CLFactory.PoolCreated
# handler can resolve it with a direct get() without a per-chain lookup constant.
# Last-writer-wins across gauge factory generations (V2, V3, ...) — the row
# reflects the most recent chain-wide defaults.
type CLGaugeConfig {
  id: ID! # Format: stringified chainId (e.g. "8453" for Base)
  defaultEmissionsCap: BigInt! @config(precision: 24) # Chain-wide default gauge emissions cap; applied when a pool's gauge has no SetEmissionsCap override.
  defaultMinStakeTime: BigInt! @config(precision: 24) # Chain-wide default LP stake lockup (seconds), set via CLGaugeFactoryV3.SetDefaultMinStakeTime. 0 before V3.
  penaltyRate: BigInt! @config(precision: 24) # Early-unstake penalty rate in basis points, set via CLGaugeFactoryV3.SetPenaltyRate. 0 before V3.
  lastUpdatedTimestamp: Timestamp! # Timestamp of the last CLGaugeConfig update
}

type DispatchId_event {
  id: ID! # Format: {transactionHash}_{chainId}_{messageId}
  chainId: Int! # Chain ID where the message was dispatched (origin chain)
  transactionHash: String! @index # Transaction hash of the dispatch transaction
  messageId: String! @index # Unique message ID identifying the cross-chain message in Hyperlane
}

type ProcessId_event {
  id: ID! # Format: {transactionHash}_{chainId}_{messageId}
  chainId: Int! # Chain ID where the message was processed (destination chain)
  transactionHash: String! @index # Transaction hash of the process transaction
  messageId: String! @index # Unique message ID identifying the cross-chain message in Hyperlane (matches DispatchId messageId)
}

type ALM_TotalSupplyLimitUpdated_event {
  id: ID! # Format: {chainId}-{lpWrapperAddress} (ALMLPWrapperId)
  lpWrapperAddress: String! # LP Wrapper associated to the event
  currentTotalSupplyLPTokens: BigInt! @config(precision: 76) # Current supply of LP tokens for the pool, emitted by the event
  transactionHash: String! # Transaction hash of the event
}

type RootPool_LeafPool {
  id: ID! # Format: {rootChainId}-{leafChainId}-{rootPoolAddress}-{leafPoolAddress} (RootPoolLeafPoolId)
  rootChainId: Int! # Optimism chain ID
  rootPoolAddress: String! @index # Placeholder contract that isn't a real pool (i.e., doesn't allow for LP, swap, etc). Mainly just for registring purposes
  leafChainId: Int! # Chain ID where the actual real pool (i.e. pool where it is possible to LP, swap, etc) is deployed
  leafPoolAddress: String! # Actual real pool that is deployed on leaf chain
}

# Maps root gauge (RootGauge/RootCLGauge on OP) to root pool for DistributeReward cross-chain resolution
type RootGauge_RootPool {
  id: ID! # Unique identifier, formatted as {rootChainId}-{rootGaugeAddress}
  rootChainId: Int! # Chain ID of the root chain (typically Optimism)
  rootGaugeAddress: String! @index # Address of the root gauge contract on the root chain
  rootPoolAddress: String! # Address of the root pool this gauge maps to
}

# Deferred vote: stored when Voted/Abstained fires but RootPool_LeafPool mapping does not exist yet
type PendingVote {
  id: ID! # Format: {chainId}-{rootPoolAddress}-{tokenId}-{txHash}-{logIndex}
  chainId: Int! # Chain ID for which the vote was intended
  rootPoolAddress: String! @index # Address of the root pool being voted on
  tokenId: BigInt! @config(precision: 76) # veNFT Token ID that cast the vote
  weight: BigInt! @config(precision: 76) # Weight of the vote in veToken units
  eventType: String! # "Voted" | "Abstained"
  timestamp: Timestamp! # Timestamp when the vote event occurred
  blockNumber: BigInt! @config(precision: 76) # Block number in which the vote was submitted
  transactionHash: String! # Transaction hash of the vote event
}

# Deferred CL pool initialization state: stored when CLPool.Initialize fires
# BEFORE CLFactory.PoolCreated has created the Pool.
# Aerodrome Slipstream emits Initialize from the pool inside the same tx as
# (and at a LOWER log index than) PoolCreated from the factory, so Envio
# delivers Initialize first. PoolCreated reads this buffer when constructing
# the new aggregator and deletes the entry afterwards.
type CLPoolPendingInitialize {
  id: ID! # Format: {chainId}-{poolAddress} (PoolId)
  chainId: Int! # chain id
  poolAddress: String! # address of the CL pool awaiting PoolCreated
  sqrtPriceX96: BigInt! @config(precision: 76) # initial sqrt price (Q96 fixed point) from the Initialize event
  tick: BigInt! @config(precision: 24) # initial tick from the Initialize event
}

# Deferred RootPool->LeafPool mapping: stored when RootPoolCreated fires but no Pool exists yet
type PendingRootPoolMapping {
  id: ID! # Format: {rootChainId}-{rootPoolAddress}
  rootChainId: Int! # Chain ID where the root pool exists (typically Optimism)
  rootPoolAddress: String! # Address of the root pool (matches RootPool_LeafPool)
  leafChainId: Int! # Chain ID where the leaf pool will be created
  token0: String! # Address of token0 in the root/leaf pool
  token1: String! # Address of token1 in the root/leaf pool
  tickSpacing: BigInt! @config(precision: 24) # Tick spacing assigned for the pool
  rootPoolMatchingHash: String! @index # {leafChainId}_{token0}_{token1}_{tickSpacing}  # Used for quick matching in Pool
}

# Deferred distribution: stored when DistributeReward fires for a root gauge but RootPool_LeafPool mapping does not exist yet
type PendingDistribution {
  id: ID! # Format: {rootChainId}-{rootPoolAddress}-{blockNumber}-{logIndex}
  rootChainId: Int! # Chain ID where the root gauge and pool exist
  rootPoolAddress: String! @index # Address of the root pool (matches RootPool_LeafPool)
  gaugeAddress: String! # Gauge that emitted DistributeReward
  amount: BigInt! @config(precision: 76) # Reward amount from event
  blockNumber: BigInt! @config(precision: 76) # Block number of the event
  blockTimestamp: Timestamp! # Block timestamp of the event
  logIndex: Int! # Log index for uniqueness within block
}

# Should be updated by TickSpacingEnabled event emitted by CLFactory contract
# It allows to initialise currentFee field for all CLPools
# CLPool fees can then be modified by either CustomSwapFeeModule or DynamicSwapFeeModule
# The same tick spacing can be enabled multiple times (to update the fee), so this entity is updated, not created new
type FeeToTickSpacingMapping {
  id: ID! # Format: {chainId}-{tickSpacing} (FeeToTickSpacingMappingId)
  chainId: Int! @index # chain id
  tickSpacing: BigInt! @config(precision: 24) @index # Tick spacing value
  fee: BigInt! @config(precision: 24) # Fee value for this tick spacing
  lastUpdatedTimestamp: Timestamp! # Timestamp when this mapping was last updated
}

# Temporary entity for storing CLPool.Mint event data until consumed by NFPM.Transfer(mint)
# This is needed because NFPM.Transfer will create NonFungiblePosition entity for a mint (i.e. from = zero address)
# However, the transfer event doesn't have all the necessary data (e.g. tickLower, tickUpper, etc).
# This is where CLpoolMintEvent comes in
# Deleted immediately after consumption
type CLPoolMintEvent {
  id: ID! # Format: {chainId}_{poolAddress}_{txHash}_{logIndex}
  chainId: Int! @index # chain id
  pool: String! @index # address of the CL pool the Mint fired on
  owner: String! # position owner from the Mint event
  tickLower: BigInt! @config(precision: 24) # lower tick of the minted range
  tickUpper: BigInt! @config(precision: 24) # upper tick of the minted range
  liquidity: BigInt! @config(precision: 76) # liquidity minted
  amount0: BigInt! @config(precision: 76) # raw token0 amount deposited
  amount1: BigInt! @config(precision: 76) # raw token1 amount deposited
  token0: String! # address of token0
  token1: String! # address of token1
  transactionHash: String! @index # transaction hash of the Mint event
  logIndex: Int! # log index of the Mint event within the transaction
  consumedByTokenId: BigInt @index # Set when consumed (null = unconsumed)
  createdAt: Timestamp! # timestamp the buffer row was created
}

# Tracks burned principal per CL position that hasn't been collected yet.
# Used to isolate actual swap fees from the CLPool Collect event, which emits
# a combined amount (burned principal + accumulated fees) in tokensOwed.
#
# Flow: Burn adds principal here → Collect subtracts it → remainder = fees.
# Keyed by contract-level position identity (pool + owner + tick range).
type CLPositionPendingPrincipal {
  id: ID! # {chainId}-{poolAddress}-{owner}-{tickLower}-{tickUpper}
  # Principal from Burn events not yet drained by Collect.
  # Accumulates across multiple Burns; reduced when Collect fires.
  pendingPrincipal0: BigInt! @config(precision: 76)
  pendingPrincipal1: BigInt! @config(precision: 76) # token1 counterpart of pendingPrincipal0 (see pendingPrincipal0).
}

# Per-transaction registry of CLPoolMintEvent IDs, used to skip the index scan
# on CLPoolMintEvent.getWhere({ transactionHash }) in the NFPM.Transfer(mint) consumer.
# The consumer knows chainId + txHash; it reads this row and then PK-gets each event by id.
# Cleaned up as events are consumed: ids are removed on consumption and the row is deleted
# when the last id is removed.
type TxCLPoolMintRegistry {
  id: ID! # Format: {chainId}-{txHash}
  mintEventIds: [String!]! # CLPoolMintEvent ids produced in this tx, in insertion order
}

# Per-(tx, pool) registry of PoolTransferInTx ids, used to skip the index scan
# on PoolTransferInTx.getWhere({ txHash }) in the Pool.Mint / Pool.Burn consumer.
# The consumer knows chainId + txHash + pool; it reads this row and then PK-gets
# each transfer by id. Rows are pruned on consumption and deleted when empty.
type TxPoolTransferRegistry {
  id: ID! # Format: {chainId}-{txHash}-{poolAddress}
  transferIds: [String!]! # PoolTransferInTx ids produced in this (tx, pool), in insertion order
}

# Temporary entity for matching Mint/Burn with Transfer events
# Only stores mint/burn transfers (isMint || isBurn) to reduce storage
type PoolTransferInTx {
  id: ID! # Format: {chainId}-{txHash}-{poolAddress}-{logIndex}
  chainId: Int! @index # chain id
  txHash: String! @index # transaction hash containing the transfer
  pool: String! @index # address of the pool whose LP token was transferred
  logIndex: Int! # log index of the Transfer event within the transaction
  blockNumber: BigInt! # block number of the transfer
  from: String! # sender address (0x0 for mints)
  to: String! # recipient address (0x0 for burns)
  value: BigInt! @config(precision: 76) # LP token amount transferred
  isMint: Boolean! # from == 0x0
  isBurn: Boolean! # to == 0x0
  timestamp: Timestamp! # block timestamp of the transfer
}

# Temporary entity for matching Withdraw events with Transfer events (burns)
# Similar to PoolTransferInTx but for ALM LP Wrapper
# Only needed for burns (to = 0x0) since Deposit events emit the correct minted amount
# Needed for LPWrapper V1 Withdraw event handler fix
type ALMLPWrapperTransferInTx {
  id: ID! # Format: {chainId}-{txHash}-{wrapperAddress}-{logIndex}
  chainId: Int! @index # chain id
  txHash: String! @index # transaction hash containing the transfer
  wrapperAddress: String! @index # address of the ALM LP wrapper whose token was transferred
  logIndex: Int! # log index of the Transfer event within the transaction
  blockNumber: BigInt! # block number of the transfer
  from: String! # sender address (0x0 for mints)
  to: String! # recipient address (0x0 for burns)
  value: BigInt! @config(precision: 76) # LP token amount transferred
  isBurn: Boolean! # to == 0x0
  timestamp: Timestamp! # block timestamp of the transfer
}

# Singleton config state per Redistributor contract, updated by SetKeeper /
# SetUpkeepManager events. Last-writer-wins — the row reflects the most recent
# keeper / upkeep manager addresses.
#
# Redistributed and Deposited events are folded into Pool
# counters (totalEmissionsRedistributed / totalEmissionsForfeited) via a
# gauge→pool lookup; they have no dedicated entity.
type RedistributorConfig {
  id: ID! # Format: {chainId}-{redistributorAddress}
  chainId: Int! @index # chain id
  redistributorAddress: String! # Redistributor contract address
  keeper: String! # Current keeper address (empty string until SetKeeper fires)
  upkeepManager: String! # Current upkeep manager address (empty string until SetUpkeepManager fires)
  lastUpdatedTimestamp: Timestamp! # Timestamp of the last config update
}
