name: PNPM Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      ENVIO_API_TOKEN: ${{ secrets.ENVIO_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Single package: envio v3.0.2 codegen emits .envio/types.d.ts, not a `generated` workspace
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # envio v3.0.2 codegen writes type declarations to .envio/types.d.ts (gitignored),
      # consumed via the `envio` package — no `generated/` directory is produced.
      - name: Generate types
        run: |
          pnpm run codegen
          # Fail fast if codegen didn't produce the type declarations
          test -f .envio/types.d.ts || (echo ".envio/types.d.ts missing after codegen" && exit 1)

      - name: Build
        run: pnpm run build

      - name: QA
        run: pnpm run qa

      - name: Run tests
        run: pnpm test
